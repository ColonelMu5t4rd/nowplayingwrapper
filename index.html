<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Now Playing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0e8;
    --surface: #ede6d6;
    --text: #2c2a24;
    --subtext: #4a4838;
    --accent: #6b6b3a;
    --btn-bg: rgba(0,0,0,0.07);
    --btn-hover: rgba(0,0,0,0.13);
    --card-bg: rgba(245,240,232,0.52);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    filter: blur(40px) saturate(1.1);
  }

  /* ── Layout ── */
  #layout {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }

  /* ── Player card ── */
  #app {
    width: 100%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    padding: 20px;
    border: 0.5px solid rgba(255,255,255,0.5);
    align-items: center;
    gap: 24px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.22);
  }

  #art-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    background: var(--surface);
    flex-shrink: 0;
  }

  #art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s ease;
  }

  #art.loading { opacity: 0; }

  #info {
    width: 100%;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
  }

  #info-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #track-name {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #artist-name {
    font-size: 18px;
    color: var(--subtext);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #album-line {
    font-size: 15px;
    color: var(--subtext);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  #year {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    line-height: 1;
    flex-shrink: 0;
    background: #506432;
    color: #f5f0e8;
    padding: 4px 10px;
    border-radius: 6px;
    transition: background 0.6s ease;
  }

  #badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  #badges:empty { display: none; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(0,0,0,0.10);
    color: var(--text);
    white-space: nowrap;
  }

  .badge.genre { background: rgba(107,107,58,0.22); text-transform: capitalize; }
  .badge.explicit { background: rgba(0,0,0,0.20); font-size: 10px; }

  .badge.pop {
    display: flex;
    align-items: center;
    gap: 6px;
    font-variant-numeric: tabular-nums;
  }

  .pop-track {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: rgba(0,0,0,0.15);
    overflow: hidden;
  }

  .pop-fill { display: block; height: 100%; background: var(--accent); }

  #meta {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #meta:empty, #meta > div:empty { display: none; }

  #device-line, #upnext-line {
    font-size: 12px;
    color: var(--subtext);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #upnext-line strong { color: var(--text); font-weight: 600; }

  #progress-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(0,0,0,0.12);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  #progress-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
    pointer-events: none;
  }

  #progress-bar:hover #progress-fill { background: var(--accent); }

  #time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--subtext);
    font-variant-numeric: tabular-nums;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--subtext);
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  .ctrl-btn:hover, .ctrl-btn:active {
    color: var(--text);
    background: var(--btn-hover);
  }

  .ctrl-btn:focus-visible {
    color: var(--text);
    background: var(--btn-hover);
    box-shadow: 0 0 0 3px var(--accent);
  }

  .ctrl-btn svg { display: block; }

  #btn-play-pause {
    color: var(--text);
    background: var(--btn-bg);
    width: 56px;
    height: 56px;
  }

  #btn-play-pause:hover { background: var(--btn-hover); }

  #idle {
    text-align: center;
    color: var(--subtext);
    font-size: 15px;
    line-height: 1.6;
  }

  #idle strong {
    display: block;
    color: var(--text);
    font-size: 17px;
    margin-bottom: 8px;
  }

  /* ── Lyrics card ── */
  #lyrics-card {
    display: none;
    flex: 1;
    min-width: 0;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    border: 0.5px solid rgba(255,255,255,0.5);
    overflow: hidden;
    position: relative;
  }

  #lyrics-scroll {
    height: 100%;
    overflow-y: auto;
    padding: 48px 32px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }

  #lyrics-scroll::-webkit-scrollbar { display: none; }

  #lyrics-lines {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .lyric-line {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.3;
    color: rgba(44,42,36,0.25);
    transition: color 0.3s ease, font-size 0.2s ease;
    cursor: default;
  }

  .lyric-line.active {
    color: var(--text);
    font-size: 30px;
  }

  .lyric-line.past {
    color: rgba(44,42,36,0.45);
  }

  #lyrics-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--subtext);
    font-size: 15px;
  }

  /* ── Auth screen ── */
  #auth-screen {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #auth-screen h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }

  #auth-screen p {
    color: var(--subtext);
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
  }

  #btn-auth {
    background: var(--accent);
    color: #f5f0e8;
    border: none;
    border-radius: 100px;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-auth:focus-visible { box-shadow: 0 0 0 3px var(--accent); outline: none; }
  #btn-auth:active { opacity: 0.85; }

  .hidden { display: none !important; }

  /* ── Landscape / TV layout ── */
  @media (orientation: landscape) and (min-width: 768px) {
    body { padding: 24px 32px; }

    #layout {
      max-width: 1100px;
      height: calc(100dvh - 48px);
      align-items: stretch;
    }

    #app {
      width: 400px;
      flex-shrink: 0;
    }

    #art-wrap { aspect-ratio: 1; }

    #track-name { font-size: 22px; }
    #artist-name { font-size: 15px; }
    #album-line { font-size: 13px; }

    #lyrics-card { display: block; max-width: 400 px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="auth-screen">
  <h1>Now Playing</h1>
  <p>Connect your Spotify account to see what's playing.</p>
  <button id="btn-auth">Connect Spotify</button>
</div>

<div id="layout" class="hidden">
  <!-- Player card -->
  <div id="app">
    <div id="art-wrap">
      <img id="art" src="" alt="Album art">
    </div>

    <div id="info">
      <div id="info-text">
        <div id="track-name">—</div>
        <div id="artist-name">—</div>
        <div id="album-line"></div>
        <div id="badges"></div>
      </div>
      <div id="year"></div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div id="time-labels">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-play-pause" title="Play / Pause"></button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/>
        </svg>
      </button>
    </div>

    <div id="meta">
      <div id="device-line"></div>
      <div id="upnext-line"></div>
    </div>

    <div id="idle" class="hidden">
      <strong>Nothing playing</strong>
      Open Spotify on any device to start something.
    </div>
  </div>

  <!-- Lyrics card -->
  <div id="lyrics-card">
    <div id="lyrics-scroll">
      <div id="lyrics-lines"></div>
    </div>
    <div id="lyrics-empty">No lyrics available</div>
  </div>
</div>

<script>
const CLIENT_ID    = '1462278c25c24472ac91452e20262d5f';
const REDIRECT_URI = 'https://colonelmu5t4rd.github.io/nowplayingwrapper/';
const SCOPES       = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing',
].join(' ');

// ── PKCE ─────────────────────────────────────────────────────────────────────
function randomBytes(n) { return crypto.getRandomValues(new Uint8Array(n)); }
function base64url(buf) {
  return btoa(String.fromCharCode(...buf))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  return new Uint8Array(await crypto.subtle.digest('SHA-256', enc));
}
async function pkceChallenge() {
  const verifier  = base64url(randomBytes(32));
  const challenge = base64url(await sha256(verifier));
  return { verifier, challenge };
}

// ── Token storage ─────────────────────────────────────────────────────────────
function saveTokens(data) {
  localStorage.setItem('sp_access_token',  data.access_token);
  localStorage.setItem('sp_refresh_token', data.refresh_token);
  localStorage.setItem('sp_expires_at',    Date.now() + data.expires_in * 1000);
}
function getAccessToken()  { return localStorage.getItem('sp_access_token'); }
function getRefreshToken() { return localStorage.getItem('sp_refresh_token'); }
function tokenExpired()    { return Date.now() > +localStorage.getItem('sp_expires_at') - 60_000; }

async function refreshAccessToken() {
  const rt = getRefreshToken();
  if (!rt) { logout(); return; }
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token', refresh_token: rt, client_id: CLIENT_ID,
    }),
  });
  if (!res.ok) { logout(); return; }
  const data = await res.json();
  saveTokens({ ...data, refresh_token: data.refresh_token || rt });
}

async function ensureToken() { if (tokenExpired()) await refreshAccessToken(); }

function logout() {
  ['sp_access_token','sp_refresh_token','sp_expires_at','sp_verifier']
    .forEach(k => localStorage.removeItem(k));
  location.reload();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-auth').addEventListener('click', async () => {
  const { verifier, challenge } = await pkceChallenge();
  localStorage.setItem('sp_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
    scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge,
  });
  location.href = `https://accounts.spotify.com/authorize?${params}`;
});

async function handleCallback(code) {
  const verifier = localStorage.getItem('sp_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code', code,
      redirect_uri: REDIRECT_URI, client_id: CLIENT_ID, code_verifier: verifier,
    }),
  });
  if (!res.ok) { alert('Auth failed. Try again.'); return; }
  const tokenData = await res.json();
  saveTokens(tokenData);
  localStorage.removeItem('sp_verifier');
  history.replaceState({}, '', location.pathname);
  startPlayer();
}

// ── Spotify API ───────────────────────────────────────────────────────────────
async function apiGet(path) {
  await ensureToken();
  const res = await fetch(`https://api.spotify.com/v1${path}`, {
    headers: { Authorization: `Bearer ${getAccessToken()}` },
  });
  if (res.status === 401) { logout(); return null; }
  if (res.status === 204 || res.status === 202) return null;
  if (!res.ok) return null;
  return res.json();
}

async function apiPut(path, body) {
  await ensureToken();
  await fetch(`https://api.spotify.com/v1${path}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${getAccessToken()}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
}

async function apiPost(path) {
  await ensureToken();
  await fetch(`https://api.spotify.com/v1${path}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${getAccessToken()}` },
  });
}

// ── Audio features (energy → motion speed, valence → background tint) ──────────
let audioFeat = { energy: 0.5, valence: 0.5 };

async function fetchAudioFeatures(trackId) {
  const data = await apiGet(`/audio-features/${trackId}`);
  if (data) {
    audioFeat = { energy: data.energy ?? 0.5, valence: data.valence ?? 0.5 };
  } else {
    audioFeat = { energy: 0.5, valence: 0.5 };
    warnDeprecated('audio-features');
  }
}

let _warnedEndpoints = new Set();
function warnDeprecated(endpoint) {
  if (_warnedEndpoints.has(endpoint)) return;
  _warnedEndpoints.add(endpoint);
  console.warn(
    `[now-playing] /${endpoint} returned no data — likely deprecated for this app ` +
    `(Spotify removed it for apps created after Nov 2024). ` +
    `Falling back to neutral animation speed/tint.`
  );
}

// ── Badges / meta ─────────────────────────────────────────────────────────────
let curGenres = [], curPopularity = 0, curExplicit = false;

function renderBadges() {
  const el = document.getElementById('badges');
  el.innerHTML = '';

  curGenres.slice(0, 2).forEach(g => {
    const b = document.createElement('span');
    b.className = 'badge genre';
    b.textContent = g;
    el.appendChild(b);
  });

  if (curExplicit) {
    const b = document.createElement('span');
    b.className = 'badge explicit';
    b.textContent = 'EXPLICIT';
    el.appendChild(b);
  }

  const p = document.createElement('span');
  p.className = 'badge pop';
  p.title = 'Popularity';
  const track = document.createElement('span');
  track.className = 'pop-track';
  const fill = document.createElement('span');
  fill.className = 'pop-fill';
  fill.style.width = curPopularity + '%';
  track.appendChild(fill);
  p.appendChild(track);
  p.appendChild(document.createTextNode(curPopularity));
  el.appendChild(p);
}

async function fetchTrackMeta(trackId, artistId) {
  const [track, artist] = await Promise.all([
    apiGet(`/tracks/${trackId}`),
    artistId ? apiGet(`/artists/${artistId}`) : Promise.resolve(null),
  ]);
  console.log('[now-playing] track meta', { track, artist });
  if (track) {
    if (typeof track.popularity === 'number') curPopularity = track.popularity;
    curExplicit = !!track.explicit;
  }
  curGenres = artist?.genres?.slice(0, 2) ?? [];
  renderBadges();
}

async function fetchQueue() {
  const data = await apiGet('/me/player/queue');
  const next = data?.queue?.[0];
  const el = document.getElementById('upnext-line');
  el.innerHTML = '';
  if (next) {
    el.appendChild(document.createTextNode('Up next: '));
    const strong = document.createElement('strong');
    strong.textContent = next.name;
    el.appendChild(strong);
    const artists = next.artists?.map(a => a.name).join(', ') ?? '';
    if (artists) el.appendChild(document.createTextNode(' — ' + artists));
  }
}

// ── Lyrics ────────────────────────────────────────────────────────────────────
let lyricsLines = []; // [{timeMs, text}]
let lastLyricsTrackId = null;
let activeLineIndex = -1;

async function fetchLyricsSpotify(trackId) {
  await ensureToken();
  const res = await fetch(
    `https://spclient.wg.spotify.com/color-lyrics/v2/track/${trackId}?format=json&vocalRemoval=false&market=from_token`,
    { headers: { Authorization: `Bearer ${getAccessToken()}`, 'App-platform': 'WebPlayer' } }
  );
  if (!res.ok) return null;
  const data = await res.json();
  const lines = data?.lyrics?.lines;
  if (!lines?.length) return null;
  return lines
    .map(l => ({ timeMs: +l.startTimeMs, text: l.words }))
    .filter(l => l.text && l.text !== '♪');
}

async function fetchLyricsLrclib(artist, title, album, durationSecs) {
  const params = new URLSearchParams({
    artist_name: artist, track_name: title,
    album_name: album,  duration: Math.round(durationSecs),
  });
  const res = await fetch(`https://lrclib.net/api/get?${params}`);
  if (!res.ok) return null;
  const data = await res.json();
  const src = data.syncedLyrics || data.plainLyrics;
  if (!src) return null;

  if (data.syncedLyrics) {
    return src.split('\n')
      .map(line => {
        const m = line.match(/^\[(\d+):(\d+\.\d+)\]\s*(.*)/);
        if (!m) return null;
        return { timeMs: (+m[1] * 60 + +m[2]) * 1000, text: m[3] };
      })
      .filter(l => l && l.text);
  }

  // plain lyrics — no timestamps, just display statically
  return src.split('\n')
    .filter(l => l.trim())
    .map((text, i) => ({ timeMs: i * 3000, text }));
}

async function fetchLyrics(trackId, artist, title, album, durationMs) {
  lyricsLines = [];
  activeLineIndex = -1;
  renderLyricsEmpty('Loading lyrics...');

  try {
    let lines = await fetchLyricsSpotify(trackId);
    if (!lines) lines = await fetchLyricsLrclib(artist, title, album, durationMs / 1000);
    if (lines?.length) {
      lyricsLines = lines;
      renderLyricsLines();
    } else {
      renderLyricsEmpty('No lyrics available');
    }
  } catch {
    renderLyricsEmpty('No lyrics available');
  }
}

function renderLyricsEmpty(msg) {
  document.getElementById('lyrics-lines').innerHTML = '';
  document.getElementById('lyrics-empty').textContent = msg;
  document.getElementById('lyrics-empty').classList.remove('hidden');
}

function renderLyricsLines() {
  document.getElementById('lyrics-empty').classList.add('hidden');
  const container = document.getElementById('lyrics-lines');
  container.innerHTML = '';
  lyricsLines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.textContent = line.text;
    el.dataset.index = i;
    container.appendChild(el);
  });
}

function syncLyrics(posMs) {
  if (!lyricsLines.length) return;

  let idx = 0;
  for (let i = 0; i < lyricsLines.length; i++) {
    if (lyricsLines[i].timeMs <= posMs) idx = i;
  }

  if (idx === activeLineIndex) return;
  activeLineIndex = idx;

  const els = document.querySelectorAll('.lyric-line');
  els.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i === idx) el.classList.add('active');
    else if (i < idx) el.classList.add('past');
  });

  // scroll active line to 1/3 from top
  const activeEl = els[idx];
  if (activeEl) {
    const scroll = document.getElementById('lyrics-scroll');
    const offset = activeEl.offsetTop - scroll.clientHeight / 3;
    scroll.scrollTo({ top: offset, behavior: 'smooth' });
  }
}

// ── Player UI ─────────────────────────────────────────────────────────────────
const PLAY_ICON  = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_ICON = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

let currentTrackId = null;
let pollInterval   = null;
let isPlaying  = false;
let durationMs = 0;
let progressMs = 0;
let lastPollAt = 0;

function formatMs(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ── Canvas background (kaleidoscope, cycles mode per track) ────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
const SEGMENTS = 8;
const BG_MODES = ['orbs', 'shards', 'ribbons', 'emitters'];

let bgColors = [[80,100,50], [60,80,100], [100,70,40], [90,55,80], [50,90,75]];
let bgMode   = 'orbs';
let bgSpin   = 0;
let rings    = [];
let lastRingClock = 0;
let clock     = 0; // advances only while playing → freezes on pause

function resizeCanvas() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function setPalette(colors) { bgColors = colors; }

// pick the next mode each track change so consecutive tracks differ
function nextBgMode() {
  const others = BG_MODES.filter(m => m !== bgMode);
  bgMode = others[Math.floor(Math.random() * others.length)];
  rings = [];
}

function wedge(fn) {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.save();
  bgCtx.translate(w / 2, h / 2);
  bgCtx.globalCompositeOperation = 'multiply';
  for (let s = 0; s < SEGMENTS; s++) {
    bgCtx.save();
    bgCtx.rotate(bgSpin + s * Math.PI * 2 / SEGMENTS);
    if (s % 2) bgCtx.scale(1, -1);
    fn();
    bgCtx.restore();
  }
  bgCtx.restore();
}

function drawOrbs(S) {
  for (let k = 0; k < 5; k++) {
    const [cr, cg, cb] = bgColors[k % bgColors.length];
    const a = k * 0.7 + clock * 0.0008;
    const x = Math.cos(a) * S * (0.22 + k * 0.07);
    const y = Math.sin(a * 1.3) * S * (0.16 + k * 0.05);
    const r = S * (0.16 + k * 0.03);
    const g = bgCtx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(${cr},${cg},${cb},0.6)`);
    g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    bgCtx.beginPath(); bgCtx.arc(x, y, r, 0, Math.PI * 2);
    bgCtx.fillStyle = g; bgCtx.fill();
  }
}

function drawShards(S) {
  for (let k = 0; k < 6; k++) {
    const [cr, cg, cb] = bgColors[k % bgColors.length];
    const a = clock * 0.0005 + k * 0.9;
    const d = S * (0.15 + k * 0.08);
    const x = Math.cos(a) * d, y = Math.sin(a) * d, sz = S * (0.11 + k * 0.025);
    bgCtx.save(); bgCtx.translate(x, y); bgCtx.rotate(a * 2);
    bgCtx.beginPath();
    bgCtx.moveTo(0, -sz); bgCtx.lineTo(sz * 0.8, sz * 0.6); bgCtx.lineTo(-sz * 0.8, sz * 0.6);
    bgCtx.closePath();
    bgCtx.fillStyle = `rgba(${cr},${cg},${cb},0.4)`;
    bgCtx.fill(); bgCtx.restore();
  }
}

function drawRibbons(S) {
  for (let k = 0; k < 5; k++) {
    const [cr, cg, cb] = bgColors[k % bgColors.length];
    const ph = clock * 0.0006 + k * 1.1;
    bgCtx.beginPath();
    for (let i = 0; i <= 24; i++) {
      const tt = i / 24, ang = tt * 2.2 + ph, rad = tt * S * (0.5 + k * 0.05);
      const x = Math.cos(ang) * rad, y = Math.sin(ang) * rad;
      i ? bgCtx.lineTo(x, y) : bgCtx.moveTo(x, y);
    }
    bgCtx.lineWidth = S * 0.03;
    bgCtx.lineCap = 'round';
    bgCtx.strokeStyle = `rgba(${cr},${cg},${cb},0.5)`;
    bgCtx.stroke();
  }
}

function drawEmitters(S) {
  rings.forEach(ring => {
    const [cr, cg, cb] = ring.c;
    bgCtx.beginPath();
    bgCtx.arc(ring.ox, ring.oy, ring.r, 0, Math.PI * 2);
    bgCtx.lineWidth = S * 0.035;
    bgCtx.strokeStyle = `rgba(${cr},${cg},${cb},${ring.a})`;
    bgCtx.stroke();
  });
}

function drawBg() {
  const w = bgCanvas.width, h = bgCanvas.height, S = Math.min(w, h);
  // warm parchment base, tinted slightly toward the album's dominant color
  const [dr, dg, db] = bgColors[0];
  const t = 0.14;
  bgCtx.fillStyle = `rgb(${Math.round(245*(1-t)+dr*t)},${Math.round(240*(1-t)+dg*t)},${Math.round(232*(1-t)+db*t)})`;
  bgCtx.fillRect(0, 0, w, h);

  if (isPlaying) clock += 16 * (0.6 + audioFeat.energy * 0.9);
  if (isPlaying) bgSpin += 0.0006 * (0.5 + audioFeat.energy);

  if (bgMode === 'emitters') {
    if (isPlaying && clock - lastRingClock > 1100) {
      lastRingClock = clock;
      rings.push({
        r: 0, a: 0.7,
        c: bgColors[Math.floor(Math.random() * bgColors.length)],
        ox: (Math.random() - 0.5) * S * 0.3,
        oy: (Math.random() - 0.5) * S * 0.2,
      });
    }
    rings.forEach(r => { r.r += S * 0.006; r.a *= 0.975; });
    rings = rings.filter(r => r.a > 0.03);
  }

  wedge(() => {
    if      (bgMode === 'orbs')     drawOrbs(S);
    else if (bgMode === 'shards')   drawShards(S);
    else if (bgMode === 'ribbons')  drawRibbons(S);
    else                            drawEmitters(S);
  });
}

function extractColors(img, count = 5) {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, 64, 64);
  const data = ctx.getImageData(0, 0, 64, 64).data;

  const candidates = [];
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    const lightness = (max + min) / 510;
    const sat = max === min ? 0 : (max-min)/(255*(1-Math.abs(2*lightness-1)));
    candidates.push({ r, g, b, score: sat * (1 - Math.abs(lightness - 0.5)) });
  }
  candidates.sort((a, b) => b.score - a.score);

  const picked = [];
  for (const p of candidates) {
    if (picked.length >= count) break;
    const diverse = picked.every(q => {
      const dr = p.r-q.r, dg = p.g-q.g, db = p.b-q.b;
      return Math.sqrt(dr*dr + dg*dg + db*db) > 55;
    });
    if (diverse || picked.length === 0) picked.push(p);
  }
  return picked.length
    ? picked.map(({ r, g, b }) => [r, g, b])
    : [[80,100,50]];
}

function setArt(url) {
  const img = document.getElementById('art');
  img.classList.add('loading');
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    img.classList.remove('loading');
    try {
      const colors = extractColors(img);
      const [yr, yg, yb] = colors[0];
      document.getElementById('year').style.background = `rgb(${Math.round(yr*0.65)},${Math.round(yg*0.65)},${Math.round(yb*0.65)})`;
      setPalette(colors);
    } catch {}
  };
  img.src = url;
}

function renderIdle() {
  document.getElementById('idle').classList.remove('hidden');
  ['info','progress-wrap','controls','art-wrap'].forEach(id => {
    document.getElementById(id).style.opacity = id === 'art-wrap' ? '0.4' : '0.3';
  });
}

function renderActive() {
  document.getElementById('idle').classList.add('hidden');
  ['info','progress-wrap','controls','art-wrap'].forEach(id => {
    document.getElementById(id).style.opacity = '';
  });
}

function updateProgress(elapsed) {
  const pos = Math.min(progressMs + elapsed, durationMs);
  const pct = durationMs > 0 ? (pos / durationMs) * 100 : 0;
  document.getElementById('progress-fill').style.transition = elapsed === 0 ? 'none' : '';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatMs(pos);
  document.getElementById('time-total').textContent   = formatMs(durationMs);
  syncLyrics(pos);
}

function tick() {
  if (isPlaying) updateProgress(Date.now() - lastPollAt);
  drawBg();
  requestAnimationFrame(tick);
}

function applyState(state) {
  if (!state || !state.item) { renderIdle(); return; }

  renderActive();

  const track = state.item;
  isPlaying  = state.is_playing;
  durationMs = track.duration_ms;
  progressMs = state.progress_ms;
  lastPollAt = Date.now();

  const artUrl = track.album?.images?.[0]?.url;
  if (artUrl) setArt(artUrl);

  document.getElementById('track-name').textContent  = track.name;
  document.getElementById('artist-name').textContent = track.artists?.map(a => a.name).join(', ') ?? '—';
  document.getElementById('album-line').textContent  = track.album?.name ?? '';
  document.getElementById('year').textContent        = track.album?.release_date?.slice(0,4) ?? '';

  document.getElementById('btn-play-pause').innerHTML = isPlaying ? PAUSE_ICON : PLAY_ICON;

  const dev = state.device?.name;
  document.getElementById('device-line').textContent = dev ? `Playing on ${dev}` : '';

  if (track.id !== currentTrackId) {
    currentTrackId = track.id;
    nextBgMode();

    curPopularity = track.popularity ?? 0;
    curExplicit   = !!track.explicit;
    renderBadges();

    fetchAudioFeatures(track.id);
    fetchTrackMeta(track.id, track.artists?.[0]?.id);
    fetchQueue();
    fetchLyrics(
      track.id,
      track.artists?.[0]?.name ?? '',
      track.name,
      track.album?.name ?? '',
      track.duration_ms
    );
  }

  updateProgress(0);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('btn-play-pause').addEventListener('click', async () => {
  if (isPlaying) { await apiPut('/me/player/pause'); isPlaying = false; }
  else           { await apiPut('/me/player/play');  isPlaying = true;  }
  document.getElementById('btn-play-pause').innerHTML = isPlaying ? PAUSE_ICON : PLAY_ICON;
});

document.getElementById('btn-next').addEventListener('click', async () => {
  await apiPost('/me/player/next');
  setTimeout(poll, 800);
});

document.getElementById('btn-prev').addEventListener('click', async () => {
  const pos = progressMs + (Date.now() - lastPollAt);
  if (pos > 3000) {
    await apiPut('/me/player/seek?position_ms=0');
    progressMs = 0; lastPollAt = Date.now();
  } else {
    await apiPost('/me/player/previous');
    setTimeout(poll, 800);
  }
});

document.getElementById('progress-bar').addEventListener('click', async (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pos  = Math.floor(((e.clientX - rect.left) / rect.width) * durationMs);
  await apiPut(`/me/player/seek?position_ms=${pos}`);
  progressMs = pos; lastPollAt = Date.now();
});

// ── Polling ───────────────────────────────────────────────────────────────────
async function poll() {
  const state = await apiGet('/me/player');
  applyState(state);
}

function startPlayer() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('layout').classList.remove('hidden');
  poll();
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 3000);
  requestAnimationFrame(tick);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  const code = new URLSearchParams(location.search).get('code');
  if (code) { await handleCallback(code); return; }
  if (getAccessToken()) startPlayer();
})();
</script>
